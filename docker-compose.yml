services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: topcv_content
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d topcv_content']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  media_data:
